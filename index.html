    // ─── BENEFITS ROI COMPARISON ────────────────────────────────────────────

    const SORT_OPTIONS = [
      { id: 'roi', label: 'ROI multiple' },
      { id: 'saving', label: 'Est. saving' },
      { id: 'cost', label: 'Cost (low → high)' },
      { id: 'payback', label: 'Payback speed' },
    ];

    function BenefitsROIComparison({ answers, results }) {
      const [assumption, setAssumption] = useState('mid');  // low | mid | high
      const [sortBy, setSortBy] = useState('roi');
      const [expanded, setExpanded] = useState(false);

      // Build ROI data for all interventions that have a model
      const allWithROI = INTERVENTIONS
        .filter(i => INTERVENTION_ROI[i.id])
        .map(i => {
          const roi = calcInterventionROI(i, answers, results);
          const applicable = i.condition(answers, results);
          return { ...i, roi, applicable };
        })
        .filter(i => i.roi !== null);

      // Sort
      const sorted = [...allWithROI].sort((a, b) => {
        const ar = a.roi, br = b.roi;
        if (sortBy === 'roi') return (br.roiMid ?? 0) - (ar.roiMid ?? 0);
        if (sortBy === 'saving') return br.roi.saving[assumption] - ar.roi.saving[assumption];
        if (sortBy === 'cost') return ar.roi.cost[assumption] - br.roi.cost[assumption];
        if (sortBy === 'payback') {
          const ap = ar.paybackMonths ?? 999, bp = br.paybackMonths ?? 999;
          return ap - bp;
        }
        return 0;
      });

      const maxSaving = Math.max(...sorted.map(i => i.roi.saving[assumption]), 1);
      const maxROI = Math.max(...sorted.map(i => i.roi.roiMid ?? 0), 1);

      return (
        <div className="mt-8">
          <div className="flex items-center justify-between mb-1 flex-wrap gap-2">
            <div>
              <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-widest">Benefits ROI Comparison</h3>
              <p className="text-xs text-slate-400 mt-0.5">Estimated cost vs. saving for each intervention — calculated from your workforce size and cost exposure</p>
            </div>
            <button onClick={() => setExpanded(e => !e)}
              className="text-xs font-semibold text-blue-600 hover:text-blue-800 flex items-center gap-1 no-print">
              {expanded ? 'Hide' : 'Show all interventions'}
              <Icon name={expanded ? 'chevron-up' : 'chevron-down'} size={12}/>
            </button>
          </div>

          {/* Controls */}
          <div className="flex flex-wrap items-center gap-3 mb-4 mt-3">
            <div className="flex items-center gap-1.5">
              <span className="text-xs font-semibold text-slate-500">Cost assumption:</span>
              <div className="flex bg-slate-100 rounded-lg p-0.5">
                {[{ id: 'low', label: 'Low' }, { id: 'mid', label: 'Mid' }, { id: 'high', label: 'High' }].map(opt => (
                  <button key={opt.id} onClick={() => setAssumption(opt.id)}
                    className={`text-xs font-semibold px-3 py-1.5 rounded-md transition-all ${assumption === opt.id ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="text-xs font-semibold text-slate-500">Sort by:</span>
              <div className="flex bg-slate-100 rounded-lg p-0.5">
                {SORT_OPTIONS.map(opt => (
                  <button key={opt.id} onClick={() => setSortBy(opt.id)}
                    className={`text-xs font-semibold px-3 py-1.5 rounded-md transition-all ${sortBy === opt.id ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Table */}
          <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden print-card">
            {/* Header */}
            <div className="grid grid-cols-12 gap-2 px-4 py-2.5 bg-slate-50 border-b border-slate-100 text-[10px] font-bold uppercase tracking-widest text-slate-400">
              <div className="col-span-4">Intervention</div>
              <div className="col-span-2 text-right">Annual cost</div>
              <div className="col-span-2 text-right">Est. saving</div>
              <div className="col-span-2 text-right">ROI</div>
              <div className="col-span-2 text-right">Payback</div>
            </div>

            {/* Rows */}
            {(expanded ? sorted : sorted.filter(i => i.applicable)).map((item, idx) => {
              const r = item.roi;
              const cost = r.cost[assumption];
              const saving = r.saving[assumption];
              const roi = cost > 0 ? saving / cost : null;
              const payback = cost > 0 && saving > 0 ? Math.round((cost / saving) * 12) : null;
              const savingBarPct = Math.min((saving / maxSaving) * 100, 100);
              const isPositive = roi !== null && roi >= 1;
              const isApplicable = item.applicable;

              return (
                <div key={item.id} className={`border-b border-slate-50 last:border-0 transition-colors ${!isApplicable ? 'opacity-40' : ''}`}>
                  <div className="grid grid-cols-12 gap-2 px-4 py-3 items-center">
                    {/* Name */}
                    <div className="col-span-4">
                      <div className="flex items-start gap-2">
                        <span className="text-base flex-shrink-0 mt-0.5">{item.icon}</span>
                        <div className="min-w-0">
                          <p className="text-xs font-semibold text-slate-800 leading-snug">{item.title}</p>
                          <p className="text-[10px] text-slate-400 mt-0.5 leading-snug">{item.category}</p>
                          {!isApplicable && <p className="text-[10px] text-slate-300 mt-0.5 italic">Not triggered by your profile</p>}
                        </div>
                      </div>
                    </div>

                    {/* Annual cost */}
                    <div className="col-span-2 text-right">
                      <p className="text-xs font-bold text-slate-800">{cost === 0 ? 'Minimal' : formatAUDShort(cost)}</p>
                      {r.cost.low !== r.cost.high && (
                        <p className="text-[10px] text-slate-400 mt-0.5">{r.cost.low === 0 ? '$0' : formatAUDShort(r.cost.low)} – {formatAUDShort(r.cost.high)}</p>
                      )}
                    </div>

                    {/* Est. saving */}
                    <div className="col-span-2 text-right">
                      <p className="text-xs font-bold" style={{ color: isPositive ? '#15803d' : '#64748b' }}>{formatAUDShort(saving)}</p>
                      <div className="flex justify-end mt-1">
                        <div className="h-1 bg-slate-100 rounded-full w-16 overflow-hidden">
                          <div className="h-1 rounded-full" style={{ width: `${savingBarPct}%`, backgroundColor: isPositive ? '#16a34a' : '#94a3b8' }}/>
                        </div>
                      </div>
                    </div>

                    {/* ROI */}
                    <div className="col-span-2 text-right">
                      {roi !== null ? (
                        <span className="inline-block text-xs font-extrabold px-2 py-0.5 rounded-lg"
                          style={{ backgroundColor: isPositive ? '#dcfce7' : '#f1f5f9', color: isPositive ? '#15803d' : '#64748b' }}>
                          {roi >= 10 ? `${roi.toFixed(0)}×` : `${roi.toFixed(1)}×`}
                        </span>
                      ) : (
                        <span className="text-xs text-slate-300">—</span>
                      )}
                    </div>

                    {/* Payback */}
                    <div className="col-span-2 text-right">
                      <p className="text-xs font-semibold text-slate-700">
                        {payback === null ? '—' : payback < 1 ? '< 1 mo' : payback === 1 ? '1 month' : `${payback} mo`}
                      </p>
                    </div>
                  </div>

                  {/* Saving basis — shown on hover / expand */}
                  <div className="px-4 pb-2.5 -mt-1">
                    <p className="text-[10px] text-slate-400 ml-7 italic leading-snug">{r.savingBasis}</p>
                  </div>
                </div>
              );
            })}
          </div>

          <p className="text-[10px] text-slate-400 mt-3 leading-relaxed">
            Cost assumptions reflect published market ranges — Low = minimal implementation, Mid = typical, High = full-service engagement.
            Savings are estimated from your cost exposure data using evidence-based impact ranges. All figures are directional.
            <span className="text-slate-300"> · Greyed rows = not triggered by your current profile but shown for reference when "Show all interventions" is enabled.</span>
          </p>
        </div>
      );
    }

    // ─── ACTION PLAN PAGE ───────────────────────────────────────────────────

    const EFFORT_STYLE = {
      'Low':    { bg: '#dcfce7', color: '#15803d', label: 'Low effort' },
      'Medium': { bg: '#fef3c7', color: '#b45309', label: 'Medium effort' },
      'High':   { bg: '#fee2e2', color: '#dc2626', label: 'High effort' },
    };

    function InterventionCard({ item, rank }) {
      const [expanded, setExpanded] = useState(false);
      const effortStyle = EFFORT_STYLE[item.effort] || EFFORT_STYLE['Medium'];
      return (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden print-card">
          <div className="p-5">
            <div className="flex items-start gap-4">
              <div className="flex-shrink-0 flex flex-col items-center gap-1.5">
                <div className="w-8 h-8 rounded-full bg-blue-600 text-white text-xs font-extrabold flex items-center justify-center">{rank}</div>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex flex-wrap items-center gap-2 mb-1.5">
                  <span className="text-[10px] font-bold uppercase tracking-wide text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{item.category}</span>
                  <span className="text-[10px] font-bold px-2 py-0.5 rounded-full" style={{ backgroundColor: effortStyle.bg, color: effortStyle.color }}>{effortStyle.label}</span>
                </div>
                <h4 className="text-sm font-bold text-slate-900 leading-snug mb-1.5">
                  <span className="mr-1.5">{item.icon}</span>{item.title}
                </h4>
                <p className="text-xs text-slate-600 leading-relaxed">{item.description}</p>
              </div>
            </div>

            {/* Key metrics row */}
            <div className="grid grid-cols-3 gap-2 mt-4 ml-12">
              {[
                { label: 'Time to implement', value: item.time },
                { label: 'Est. cost', value: item.cost },
              ].map(({ label, value }) => (
                <div key={label} className="col-span-1 bg-slate-50 rounded-xl px-3 py-2.5">
                  <p className="text-[10px] font-semibold text-slate-400 uppercase tracking-wide mb-0.5">{label}</p>
                  <p className="text-xs font-semibold text-slate-800 leading-snug">{value}</p>
                </div>
              ))}
              <div className="col-span-1 bg-emerald-50 border border-emerald-100 rounded-xl px-3 py-2.5">
                <p className="text-[10px] font-semibold text-emerald-500 uppercase tracking-wide mb-0.5">Expected impact</p>
                <p className="text-xs font-semibold text-emerald-800 leading-snug">{item.impact.split('·')[0].trim()}</p>
              </div>
            </div>

            {/* Expand/collapse */}
            <button onClick={() => setExpanded(e => !e)}
              className="mt-3 ml-12 text-xs font-semibold text-blue-600 hover:text-blue-800 flex items-center gap-1 transition-colors no-print">
              {expanded ? 'Show less' : 'Why this matters'}
              <Icon name={expanded ? 'chevron-up' : 'chevron-down'} size={12}/>
            </button>
          </div>

          {expanded && (
            <div className="border-t border-slate-100 bg-blue-50 px-5 py-4 ml-0">
              <p className="text-xs font-semibold text-blue-700 mb-1 uppercase tracking-wide">Why this intervention</p>
              <p className="text-xs text-blue-800 leading-relaxed">{item.whyItMatters}</p>
              {item.impact.includes('·') && (
                <div className="mt-3">
                  <p className="text-[10px] font-semibold text-blue-600 uppercase tracking-wide mb-1.5">Expected outcomes</p>
                  <div className="flex flex-wrap gap-1.5">
                    {item.impact.split('·').map((s, i) => (
                      <span key={i} className="text-[10px] font-medium bg-white border border-blue-200 text-blue-700 px-2 py-1 rounded-full">{s.trim()}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function ActionPlanTab({ answers, results }) {
      const plan = getActionPlan(answers, results);
      const ind = INDUSTRIES.find(i => i.id === answers.industry);
      const totalCost = results.cost.total;

      if (plan.length === 0) {
        return (
          <div className="text-center py-16 text-slate-400">
            <p className="text-4xl mb-3">✅</p>
            <p className="font-semibold text-slate-600 mb-1">No high-priority interventions identified</p>
            <p className="text-sm">Your risk scores are low across all dimensions. Continue monitoring.</p>
          </div>
        );
      }

      const lowEffort = plan.filter(i => i.effort === 'Low');
      const medEffort = plan.filter(i => i.effort === 'Medium');

      return (
        <div>
          {/* Summary header */}
          <div className="bg-slate-900 rounded-2xl p-6 mb-6">
            <p className="text-slate-400 text-xs font-semibold uppercase tracking-widest mb-2">Your personalised action plan</p>
            <p className="text-white text-base font-semibold leading-relaxed mb-4">
              Based on your {ind?.label} risk profile, {plan.length} prioritised interventions have been identified — ranked by expected impact against your specific signals.
            </p>
            <div className="grid grid-cols-3 gap-3">
              <div className="bg-slate-800 rounded-xl px-4 py-3 text-center">
                <p className="text-xl font-extrabold text-white">{plan.length}</p>
                <p className="text-xs text-slate-400 mt-0.5">interventions identified</p>
              </div>
              <div className="bg-slate-800 rounded-xl px-4 py-3 text-center">
                <p className="text-xl font-extrabold text-emerald-400">{lowEffort.length}</p>
                <p className="text-xs text-slate-400 mt-0.5">low-effort quick wins</p>
              </div>
              <div className="bg-slate-800 rounded-xl px-4 py-3 text-center">
                <p className="text-xl font-extrabold text-white">{formatAUDShort(totalCost)}</p>
                <p className="text-xs text-slate-400 mt-0.5">annual exposure to address</p>
              </div>
            </div>
          </div>

          {/* Quick wins callout */}
          {lowEffort.length > 0 && (
            <div className="bg-emerald-50 border border-emerald-200 rounded-xl px-5 py-4 mb-6 flex items-start gap-3">
              <span className="text-xl flex-shrink-0">⚡</span>
              <div>
                <p className="text-sm font-bold text-emerald-800 mb-0.5">Start here — {lowEffort.length} quick win{lowEffort.length > 1 ? 's' : ''} identified</p>
                <p className="text-xs text-emerald-700 leading-relaxed">
                  {lowEffort.map(i => i.title).join(' and ')} {lowEffort.length === 1 ? 'is' : 'are'} low-effort and can be activated within weeks. These create the fastest visible impact and build internal momentum for broader change.
                </p>
              </div>
            </div>
          )}

          {/* Intervention cards */}
          <div className="space-y-4">
            {plan.map((item, i) => (
              <InterventionCard key={item.id} item={item} rank={i + 1}/>
            ))}
          </div>

          <div className="mt-6 bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-xs text-slate-500 leading-relaxed">
            <strong className="text-slate-700">About this plan:</strong> Interventions are ranked by relevance to your specific risk signals and workforce profile — not by general popularity. Priority scores are computed from your inputs; they are directional, not prescriptive. Cost and time estimates are indicative and will vary by organisation size, existing systems, and implementation approach.
          </div>

          {/* Benefits ROI Comparison */}
          <BenefitsROIComparison answers={answers} results={results}/>
        </div>
      );
    }

    // ─── RESULTS PAGE ───────────────────────────────────────────────────────

    function CostBar({ label, amount, total }) {
      const share = total > 0 ? amount / total : 0;
      return (
        <div className="flex items-center gap-3 py-2.5 border-b border-slate-100 last:border-0">
          <div className="flex-1">
            <div className="text-sm text-slate-700">{label}</div>
            <div className="h-1.5 bg-slate-100 rounded-full mt-1.5 overflow-hidden">
              <div className="h-1.5 bg-blue-400 rounded-full" style={{ width: `${Math.min(share * 100, 100)}%` }}/>
            </div>
          </div>
          <div className="text-sm font-semibold text-slate-800 text-right min-w-16">{formatAUDShort(amount)}</div>
        </div>
      );
    }

    function ResultsPage({ results, answers, onRestart }) {
      const [activeTab, setActiveTab] = useState('results');
      const [aboutOpen, setAboutOpen] = useState(false);
      const [contact, setContact] = useState({ firstName: '', company: '', email: '', role: '' });
      const [submitted, setSubmitted] = useState(false);
      const [linkCopied, setLinkCopied] = useState(false);

      const { employeeRiskScore, businessRiskScore, whsRiskScore, evpGapScore, cost, observations } = results;
      const ind = INDUSTRIES.find(i => i.id === answers.industry);
      const overallRisk = Math.round((employeeRiskScore + businessRiskScore + whsRiskScore) / 3);
      const overallLevel = getRiskLevel(overallRisk);

      const copyLink = () => {
        const encoded = encodeAnswers(answers);
        const url = `${window.location.href.split('#')[0]}#s=${encoded}`;
        navigator.clipboard.writeText(url).then(() => {
          setLinkCopied(true);
          setTimeout(() => setLinkCopied(false), 2500);
        });
      };

      const scoreDesc = {
        employee: `Your workforce profile suggests ${employeeRiskScore >= 51 ? 'elevated to high' : employeeRiskScore >= 26 ? 'moderate' : 'relatively contained'} employee risk — driven by ${answers.profile.frontlinePercentage >= 50 ? 'frontline workforce exposure, ' : ''}identified signals, and ${answers.profile.payFrequency === 'monthly' ? 'monthly pay cycles.' : 'pay cycle structure.'}`,
        business: `Operational and business risk is ${businessRiskScore >= 51 ? 'elevated' : businessRiskScore >= 26 ? 'moderate' : 'relatively low'}${answers.profile.turnoverRate >= 20 ? `, with a ${answers.profile.turnoverRate}% turnover rate contributing meaningfully to disruption cost.` : '.'}`,
        whs: `Your WHS / psychosocial score indicates that ${whsRiskScore >= 51 ? 'psychosocial risk may be emerging through fatigue, distraction, rostering instability, and uneven control measures.' : whsRiskScore >= 26 ? 'some psychosocial risk indicators are present, and a review of current controls is warranted.' : 'psychosocial risk appears relatively contained based on current inputs.'}`,
        evp: `Your EVP / support profile ${evpGapScore >= 51 ? 'appears stronger for office-based employees than frontline workers — which may increase retention and wellbeing risk in operational teams.' : evpGapScore >= 26 ? 'shows some imbalance between office-based and frontline support coverage.' : 'appears reasonably balanced across employee groups based on reported measures.'}`,
      };

      const descCards = [
        { icon: 'users', label: 'Employee Risk', desc: scoreDesc.employee, score: employeeRiskScore },
        { icon: 'trending-up', label: 'Business Risk', desc: scoreDesc.business, score: businessRiskScore },
        { icon: 'shield-check', label: 'WHS / Psychosocial', desc: scoreDesc.whs, score: whsRiskScore },
        { icon: 'alert-triangle', label: 'EVP / Support Gap', desc: scoreDesc.evp, score: evpGapScore },
      ];

      return (
        <div className="max-w-4xl mx-auto">
          {/* Header */}
          <div className="mb-6">
            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-5">
              <div>
                <p className="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1">Diagnostic Results</p>
                <h2 className="text-2xl font-bold text-slate-900">Workforce Risk Assessment</h2>
                {ind && <p className="text-sm text-slate-500 mt-1">{ind.emoji} {ind.label} · {answers.profile.employeeCount} employees</p>}
              </div>
              <div className="flex gap-2 no-print flex-wrap">
                <button onClick={copyLink}
                  className={`inline-flex items-center gap-2 font-medium px-4 py-2 rounded-lg border transition-colors text-sm ${linkCopied ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 'text-slate-600 hover:text-slate-900 border-slate-200 hover:border-slate-300'}`}>
                  {linkCopied
                    ? <><Icon name="check-circle" size={14}/> Link copied!</>
                    : <><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Share results</>}
                </button>
                <button onClick={() => window.print()}
                  className="inline-flex items-center gap-2 text-slate-600 hover:text-slate-900 font-medium px-4 py-2 rounded-lg border border-slate-200 hover:border-slate-300 transition-colors text-sm">
                  <Icon name="printer" size={14}/> Print / PDF
                </button>
                <button onClick={onRestart}
                  className="inline-flex items-center gap-2 text-slate-600 hover:text-slate-900 font-medium px-4 py-2 rounded-lg border border-slate-200 hover:border-slate-300 transition-colors text-sm">
                  <Icon name="rotate-ccw" size={14}/> Restart
                </button>
              </div>
            </div>

            <div className="rounded-2xl p-5 flex items-center gap-4" style={{ backgroundColor: overallLevel.bgColor }}>
              <div className="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0" style={{ backgroundColor: overallLevel.color + '20' }}>
                <Icon name="shield-check" size={22} style={{ color: overallLevel.color }}/>
              </div>
              <div>
                <div className="flex items-center gap-2">
                  <span className="font-bold text-slate-900">Overall Risk Level:</span>
                  <span className="font-bold text-sm px-2.5 py-0.5 rounded-full" style={{ backgroundColor: overallLevel.color + '25', color: overallLevel.color }}>{overallLevel.label}</span>
                </div>
                <p className="text-sm text-slate-600 mt-0.5">Average composite score of {overallRisk}/100 across three primary risk dimensions.</p>
              </div>
            </div>
          </div>

          {/* Tab bar */}
          <div className="flex bg-slate-100 rounded-xl p-1 mb-8 no-print">
            {[
              { id: 'results', label: '📊 Risk Results' },
              { id: 'plan', label: `⚡ Action Plan (${getActionPlan(answers, results).length})` },
            ].map(t => (
              <button key={t.id} onClick={() => { setActiveTab(t.id); window.scrollTo({ top: 0 }); }}
                className={`flex-1 text-sm font-semibold py-2.5 rounded-lg transition-all duration-200 ${activeTab === t.id ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                {t.label}
              </button>
            ))}
          </div>

          {/* ACTION PLAN TAB */}
          {activeTab === 'plan' && <ActionPlanTab answers={answers} results={results}/>}

          {/* RESULTS TAB */}
          {activeTab === 'results' && <>

          {/* Score gauges */}
          <div className="mb-8">
            <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-4">Risk Scores</h3>
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
              <ScoreGauge score={employeeRiskScore} label="Employee Risk" sublabel="Financial & individual stress"/>
              <ScoreGauge score={businessRiskScore} label="Business Risk" sublabel="Operational & cost exposure"/>
              <ScoreGauge score={whsRiskScore} label="WHS / Psychosocial" sublabel="Hazard & control adequacy"/>
              <ScoreGauge score={evpGapScore} label="EVP Support Gap" sublabel="Equity of workforce support"/>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-4">
              {descCards.map(({ icon, label, desc, score }) => {
                const lvl = getRiskLevel(score);
                return (
                  <div key={label} className="bg-white rounded-xl border border-slate-100 p-4 shadow-sm">
                    <div className="flex items-center gap-2 mb-2">
                      <Icon name={icon} size={14} style={{ color: lvl.color }}/>
                      <span className="text-xs font-semibold text-slate-700">{label}</span>
                      <span className="ml-auto text-xs font-bold px-2 py-0.5 rounded-full" style={{ backgroundColor: lvl.bgColor, color: lvl.color }}>{lvl.label}</span>
                    </div>
                    <p className="text-xs text-slate-600 leading-relaxed">{desc}</p>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Benchmarks */}
          <BenchmarkSection answers={answers} results={results}/>

          {/* Cost */}
          <div className="mb-8">
            <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-4">Estimated Annual Cost Exposure</h3>
            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden print-card">
              <div className="bg-slate-900 p-6 flex items-center justify-between">
                <div>
                  <p className="text-slate-400 text-xs font-medium uppercase tracking-wide mb-1">Total estimated exposure</p>
                  <p className="text-3xl font-bold text-white">{formatAUDShort(cost.total)}</p>
                  <p className="text-slate-400 text-xs mt-1">per year · directional estimate</p>
                </div>
                <div className="text-right hidden sm:block">
                  <p className="text-slate-400 text-xs mb-1">Full figure</p>
                  <p className="text-slate-200 text-sm font-semibold">{formatAUD(cost.total)}</p>
                </div>
              </div>
              <div className="p-6">
                <CostBar label="Turnover and replacement cost" amount={cost.turnover} total={cost.total}/>
                <CostBar label="Absenteeism and lost productivity" amount={cost.absence} total={cost.total}/>
                <CostBar label="Operational disruption and overtime" amount={cost.disruption} total={cost.total}/>
                <CostBar label="Presenteeism and engagement drag" amount={cost.productivity} total={cost.total}/>
                <div className="bg-slate-50 rounded-xl p-3.5 mt-4 text-xs text-slate-500 leading-relaxed">
                  <strong className="text-slate-700">Disclaimer:</strong> This estimate is directional and designed to highlight potential areas of business risk. It is based on industry benchmarks, reported workforce inputs, and risk signal data. It is not a precise financial calculation and should not be relied upon as such.
                </div>
              </div>
            </div>
          </div>

          {/* Industry scenario */}
          {ind && (
            <div className="mb-8">
              <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-4">Industry Context</h3>
              <div className="bg-slate-900 rounded-2xl p-6">
                <div className="flex items-center gap-3 mb-3">
                  <span className="text-2xl">{ind.emoji}</span>
                  <div>
                    <p className="font-semibold text-white text-sm">{ind.label}</p>
                    <p className="text-slate-400 text-xs">{ind.riskContext}</p>
                  </div>
                </div>
                <p className="text-slate-300 text-sm leading-relaxed">{ind.scenario}</p>
              </div>
            </div>
          )}

          {/* Key observations */}
          {observations.length > 0 && (
            <div className="mb-8">
              <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-4">Key Observations</h3>
              <div className="bg-white rounded-2xl border border-slate-100 shadow-sm divide-y divide-slate-100">
                {observations.map((obs, i) => (
                  <div key={i} className="flex items-start gap-3.5 p-4">
                    <div className="w-5 h-5 rounded-full bg-blue-100 text-blue-700 text-xs font-bold flex items-center justify-center flex-shrink-0 mt-0.5">{i + 1}</div>
                    <p className="text-sm text-slate-700 leading-relaxed">{obs}</p>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Evidence & psychosocial section */}
          <EvidenceSection/>

          {/* Score key */}
          <div className="mb-8">
            <div className="bg-slate-50 rounded-2xl p-5 border border-slate-200">
              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">Score Key</p>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                {[
                  { range: '0–25', label: 'Low', color: '#16a34a', bg: '#dcfce7' },
                  { range: '26–50', label: 'Moderate', color: '#d97706', bg: '#fef3c7' },
                  { range: '51–75', label: 'Elevated', color: '#ea580c', bg: '#ffedd5' },
                  { range: '76–100', label: 'High', color: '#dc2626', bg: '#fee2e2' },
                ].map(({ range, label, color, bg }) => (
                  <div key={label} className="flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-semibold" style={{ backgroundColor: bg, color }}>
                    <div className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: color }}/>
                    {range} — {label}
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* ROI Calculator */}
          <ROICalculator totalCostExposure={cost.total} employeeCount={answers.profile.employeeCount}/>

          {/* CTA */}
          <div className="mb-8 no-print">
            <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
              <div className="p-6 border-b border-slate-100">
                <h3 className="text-lg font-bold text-slate-900 mb-1">Want to discuss your results?</h3>
                <p className="text-slate-600 text-sm leading-relaxed">Leave your details and we'll be in touch. No obligation — just a conversation about what these results might mean for your organisation.</p>
              </div>
              {submitted ? (
                <div className="p-8 flex flex-col items-center text-center gap-3">
                  <div className="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center">
                    <Icon name="check-circle" size={24} style={{ color: '#16a34a' }}/>
                  </div>
                  <p className="font-semibold text-slate-900">Details received</p>
                  <p className="text-sm text-slate-500 max-w-sm">Thank you, {contact.firstName}. We'll be in touch with you at {contact.company} shortly.</p>
                </div>
              ) : (
                <form onSubmit={e => { e.preventDefault(); setSubmitted(true); }} className="p-6">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    {[
                      { key: 'firstName', label: 'First name', placeholder: 'Sarah', type: 'text', required: true },
                      { key: 'company', label: 'Company', placeholder: 'Acme Group', type: 'text', required: true },
                      { key: 'email', label: 'Work email', placeholder: 'sarah@acme.com.au', type: 'email', required: true },
                      { key: 'role', label: 'Role', placeholder: 'Head of People & Culture', type: 'text', required: false },
                    ].map(({ key, label, placeholder, type, required }) => (
                      <div key={key}>
                        <label className="block text-xs font-semibold text-slate-700 mb-1.5">{label}</label>
                        <input type={type} required={required} value={contact[key]} placeholder={placeholder}
                          onChange={e => setContact(c => ({ ...c, [key]: e.target.value }))}
                          className="w-full px-3.5 py-2.5 border border-slate-300 rounded-lg text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                      </div>
                    ))}
                  </div>
                  <div className="flex flex-col sm:flex-row gap-3">
                    <button type="submit" className="inline-flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-xl transition-colors text-sm">
                      <Icon name="send" size={14}/> Book a discussion
                    </button>
                    <button type="button" onClick={() => window.print()} className="inline-flex items-center justify-center gap-2 text-slate-700 hover:text-slate-900 font-medium px-6 py-3 rounded-xl border border-slate-200 hover:border-slate-300 transition-colors text-sm">
                      <Icon name="printer" size={14}/> Download summary
                    </button>
                  </div>
                </form>
              )}
            </div>
          </div>

          {/* About */}
          <CalculationBreakdown answers={answers} results={results}/>

          <SourcesFooter/>

          <div className="mb-10 no-print">
            <button onClick={() => setAboutOpen(o => !o)}
              className="w-full flex items-center justify-between px-5 py-4 bg-white rounded-xl border border-slate-200 hover:border-slate-300 transition-colors text-sm font-semibold text-slate-700">
              About this diagnostic
              <Icon name={aboutOpen ? 'chevron-up' : 'chevron-down'} size={16}/>
            </button>
            {aboutOpen && (
              <div className="bg-white border border-t-0 border-slate-200 rounded-b-xl px-5 pb-5 pt-4 text-sm text-slate-600 leading-relaxed space-y-3">
                <p><strong className="text-slate-800">Financial stress as a workforce hazard.</strong> Employee financial stress is not simply a personal issue — it is a recognised psychosocial hazard under Australian WHS frameworks. When workers are under sustained financial pressure, the effects surface in your data: absence rates rise, attention and cognitive performance decline, interpersonal friction increases, and the risk of errors in safety-sensitive environments escalates.</p>
                <p><strong className="text-slate-800">From employee pressure to operational and WHS risk.</strong> Financial stress doesn't stay contained to the individual. It transfers to operational systems through increased absence, reduced roster reliability, higher manager workload, and elevated turnover. In environments where headcount and attention are critical — aged care, logistics, manufacturing, and hospitality — this is a risk management issue, not a wellbeing issue.</p>
                <p><strong className="text-slate-800">What this tool measures.</strong> This diagnostic assesses four dimensions: employee financial and stress risk; operational and business cost risk; WHS and psychosocial exposure; and EVP equity — the degree to which support measures are available consistently across your workforce. It is designed for HR, People & Culture, WHS, and Operations leaders to use as a reflection and planning tool, not as a compliance instrument.</p>
                <p className="text-slate-500 text-xs border-t border-slate-100 pt-3">This tool is for HR and WHS reflection purposes only. It does not constitute legal, financial, or professional advice. Cost estimates are directional indicators only. Results should be interpreted in the context of your specific organisation, industry, and workforce.</p>
              </div>
            )}
          </div>
          </>}
        </div>
      );
    }

    // ─── MAIN APP ────────────────────────────────────────────────────────────

    const DEFAULT_PROFILE = {
      employeeCount: 0,
      frontlinePercentage: 50,
      turnoverRate: 15,
      averageSalary: 0,       // always the effective annual figure used in calculations
      wageType: 'annual',     // 'annual' | 'hourly'
      hourlyRate: 0,
      weeklyHours: 38,
      payFrequency: 'fortnightly',
      absencesIncreased: 'unsure',
      wagePreFilled: false,   // true if pre-filled from industry norm
    };

    const DEFAULT_ANSWERS = {
      industry: null,
      profile: DEFAULT_PROFILE,
      riskSignals: { employeeSignals: [], operationalSignals: [], whsSignals: [] },
      supportMeasures: { whiteCollarSupports: [], frontlineSupports: [] },
    };

    // Compute effective annual salary from profile (used in scoring & cost calcs)
    function effectiveAnnualSalary(profile) {
      if (profile.wageType === 'hourly') {
        return Math.round(profile.hourlyRate * profile.weeklyHours * 52);
      }
      return profile.averageSalary;
    }

    function App() {
      // ── Bootstrap: decode from URL hash or localStorage ──
      function getInitialState() {
        // 1. URL hash takes priority (shared link)
        const hash = window.location.hash;
        const hashMatch = hash.match(/[#&]s=([^&]+)/);
        if (hashMatch) {
          const decoded = decodeAnswers(hashMatch[1]);
          if (decoded) return { step: 5, answers: decoded };
        }
        // 2. LocalStorage resume
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            const { step: s, answers: a } = JSON.parse(saved);
            if (s >= 1) return { step: s, answers: a, hasSaved: true };
          }
        } catch(e) {}
        return { step: 0, answers: DEFAULT_ANSWERS };
      }

      const init = getInitialState();
      const [step, setStep] = useState(init.step);
      const [answers, setAnswers] = useState(init.answers);
      const [showResume, setShowResume] = useState(!!init.hasSaved && init.step < 5);

      // ── Persist to localStorage on every change ──
      useEffect(() => {
        if (step > 0) {
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ step, answers })); } catch(e) {}
        }
      }, [step, answers]);

      const updateProfile = (updates) =>
        setAnswers(a => ({ ...a, profile: { ...a.profile, ...updates } }));

      const toggleSignal = (section, id) =>
        setAnswers(a => {
          const cur = a.riskSignals[section];
          return { ...a, riskSignals: { ...a.riskSignals, [section]: cur.includes(id) ? cur.filter(s => s !== id) : [...cur, id] } };
        });

      const toggleSupport = (section, id) =>
        setAnswers(a => {
          const cur = a.supportMeasures[section];
          let updated;
          if (section === 'frontlineSupports' && id === 'none') {
            updated = cur.includes('none') ? [] : ['none'];
          } else if (section === 'frontlineSupports' && cur.includes('none')) {
            updated = [id];
          } else {
            updated = cur.includes(id) ? cur.filter(s => s !== id) : [...cur, id];
          }
          return { ...a, supportMeasures: { ...a.supportMeasures, [section]: updated } };
        });

      const restart = () => {
        try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
        setAnswers(DEFAULT_ANSWERS);
        setStep(0);
        window.location.hash = '';
        window.scrollTo({ top: 0 });
      };

      const goTo = (s) => {
        // When moving from industry selection (step 1) → profile (step 2),
        // pre-fill wage data from industry norms if not yet touched
        if (s === 2 && answers.industry) {
          const ind = INDUSTRIES.find(i => i.id === answers.industry);
          if (ind && !answers.profile.wagePreFilled) {
            setAnswers(a => ({
              ...a,
              profile: {
                ...a.profile,
                wageType: ind.defaultWageType,
                hourlyRate: ind.typicalHourlyRate,
                weeklyHours: ind.typicalWeeklyHours,
                averageSalary: ind.typicalAnnualSalary,
                wagePreFilled: true,
              },
            }));
          }
        }
        setStep(s);
        window.scrollTo({ top: 0 });
      };

      if (step === 0) return <LandingPage onStart={() => goTo(1)}
        showResume={showResume}
        savedIndustry={answers.industry}
        savedStep={init.step}
        onResume={() => { setShowResume(false); setStep(init.step); window.scrollTo({ top: 0 }); }}
        onDismissResume={() => { setShowResume(false); localStorage.removeItem(STORAGE_KEY); setAnswers(DEFAULT_ANSWERS); }}
      />;

      const results = step === 5 ? calculateScores(answers) : null;

      return (
        <div className="min-h-screen bg-slate-50">
          <div className="bg-white border-b border-slate-100 sticky top-0 z-10">
            <div className="max-w-3xl mx-auto px-4 py-3.5 flex items-center gap-2">
              <Icon name="shield-check" size={18} style={{ color: '#2563eb', flexShrink: 0 }}/>
              <span className="text-sm font-semibold text-slate-800">Workforce Risk & WHS Diagnostic</span>
              {step < 5 && <span className="ml-auto text-xs text-slate-400 hidden sm:block">For HR, WHS and Operations leaders</span>}
            </div>
          </div>

          <div className={step === 5 ? 'max-w-4xl mx-auto px-4 py-8' : 'max-w-3xl mx-auto px-4 py-8'}>
            {step >= 1 && step <= 4 && (
              <div className="mb-8"><ProgressBar currentStep={step}/></div>
            )}

            {step === 1 && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
                <IndustryPage selected={answers.industry} onSelect={ind => setAnswers(a => ({ ...a, industry: ind, profile: { ...a.profile, wagePreFilled: false } }))} onNext={() => goTo(2)}/>
              </div>
            )}
            {step === 2 && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
                <WorkforceProfilePage profile={answers.profile} industry={answers.industry} onChange={updateProfile} onNext={() => goTo(3)} onBack={() => goTo(1)}/>
              </div>
            )}
            {step === 3 && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
                <RiskSignalsPage selected={answers.riskSignals} onChange={toggleSignal} onNext={() => goTo(4)} onBack={() => goTo(2)}/>
              </div>
            )}
            {step === 4 && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
                <SupportMeasuresPage selected={answers.supportMeasures} onChange={toggleSupport} onNext={() => goTo(5)} onBack={() => goTo(3)}/>
              </div>
            )}
            {step === 5 && results && (
              <ResultsPage results={results} answers={answers} onRestart={restart}/>
            )}
          </div>
        </div>
      );
    }

    const rootEl = document.getElementById('root');
    const root = ReactDOM.createRoot(rootEl);
    root.render(<App/>);
  </script>
</body>
</html>

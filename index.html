        saving: (c) => ({
          low:  c.absence * 0.10 + c.turnover * 0.08 + c.disruption * 0.05 + c.productivity * 0.05,
          mid:  c.absence * 0.19 + c.turnover * 0.15 + c.disruption * 0.08 + c.productivity * 0.08,

        }),
        savingBasis: 'Reduced absence + lower turnover from pay-cycle stress relief',
      },

        annualCost: () => ({ low: 0, mid: 2500, high: 5000 }),                      // flat admin/system cost

        savingBasis: 'Absence reduction + lower pay-advance admin + reduced financial-stress turnover',
      },
      'financial-coaching': {
        annualCost: (n) => ({ low: n * 200, mid: n * 500, high: n * 800 }),
        saving: (c) => ({
          low:  c.productivity * 0.08 + c.absence * 0.05 + c.turnover * 0.04,
          mid:  c.productivity * 0.15 + c.absence * 0.10 + c.turnover * 0.07,
          high: c.productivity * 0.22 + c.absence * 0.15 + c.turnover * 0.10,
        }),
        savingBasis: 'Presenteeism reduction + lower absence from financial resilience improvement',
      },
      'psychosocial-assessment': {
        annualCost: () => ({ low: 5000, mid: 15000, high: 25000 }),
        saving: (c) => ({
          low:  c.productivity * 0.05 + c.absence * 0.05 + c.disruption * 0.03,
          mid:  c.productivity * 0.10 + c.absence * 0.08 + c.disruption * 0.06,
          high: c.productivity * 0.15 + c.absence * 0.12 + c.disruption * 0.10,
        }),
        savingBasis: 'WHS compliance risk reduction + early hazard identification savings',
      },
      'manager-training': {
        annualCost: (n) => ({ low: Math.ceil(n/10) * 500, mid: Math.ceil(n/10) * 1200, high: Math.ceil(n/10) * 2000 }),
        saving: (c) => ({
          low:  c.absence * 0.06 + c.productivity * 0.06 + c.disruption * 0.04,
          mid:  c.absence * 0.10 + c.productivity * 0.12 + c.disruption * 0.06,
          high: c.absence * 0.15 + c.productivity * 0.18 + c.disruption * 0.10,
        }),
        savingBasis: 'Earlier intervention reduces absence escalation + productivity drag',
      },
      'eap-relaunch': {
        annualCost: () => ({ low: 0, mid: 2000, high: 5000 }),                      // relaunch comms/training cost
        saving: (c) => ({
          low:  c.productivity * 0.05 + c.absence * 0.05,
          mid:  c.productivity * 0.10 + c.absence * 0.08,
          high: c.productivity * 0.15 + c.absence * 0.12,
        }),
        savingBasis: 'Increased EAP utilisation reduces presenteeism and unplanned absence',
      },
      'frontline-support-package': {
        annualCost: (n, fl) => ({ low: fl * 300, mid: fl * 800, high: fl * 1500 }),
        saving: (c) => ({
          low:  c.turnover * 0.12 + c.absence * 0.08 + c.disruption * 0.06,
          mid:  c.turnover * 0.20 + c.absence * 0.12 + c.disruption * 0.09,
          high: c.turnover * 0.28 + c.absence * 0.16 + c.disruption * 0.12,
        }),
        savingBasis: 'Reduced frontline turnover + lower absence from improved EVP equity',
      },
      'evp-audit': {
        annualCost: () => ({ low: 0, mid: 5000, high: 10000 }),
        saving: (c) => ({
          low:  c.turnover * 0.08 + c.disruption * 0.04,
          mid:  c.turnover * 0.12 + c.disruption * 0.06,
          high: c.turnover * 0.18 + c.disruption * 0.08,
        }),
        savingBasis: 'Targeted EVP gap closure reduces EVP-driven turnover',
      },
      'absence-management': {
        annualCost: () => ({ low: 2000, mid: 8000, high: 15000 }),
        saving: (c) => ({
          low:  c.absence * 0.15 + c.disruption * 0.10,
          mid:  c.absence * 0.22 + c.disruption * 0.15,
          high: c.absence * 0.30 + c.disruption * 0.20,
        }),
        savingBasis: 'Direct absence reduction + overtime and disruption cost savings',
      },
      'rostering-stability': {
        annualCost: () => ({ low: 0, mid: 5000, high: 10000 }),
        saving: (c) => ({
          low:  c.disruption * 0.12 + c.absence * 0.08,
          mid:  c.disruption * 0.20 + c.absence * 0.12,
          high: c.disruption * 0.28 + c.absence * 0.16,
        }),
        savingBasis: 'Reduced last-minute roster gaps, overtime spend, and operational disruption',
      },
      'exit-analysis': {
        annualCost: () => ({ low: 0, mid: 2500, high: 5000 }),
        saving: (c) => ({
          low:  c.turnover * 0.08,
          mid:  c.turnover * 0.12,
          high: c.turnover * 0.18,
        }),
        savingBasis: 'Targeted retention reduces avoidable turnover and replacement cost',
      },
    };

    function calcInterventionROI(item, answers, results) {
      const model = INTERVENTION_ROI[item.id];
      if (!model) return null;
      const n = Math.max(answers.profile.employeeCount, 1);
      const fl = Math.round(n * answers.profile.frontlinePercentage / 100);
      const cost = model.annualCost(n, fl);
      const saving = model.saving(results.cost);
      // mid-point figures for primary display
      const roiMid = cost.mid > 0 ? saving.mid / cost.mid : null;
      const paybackMonths = cost.mid > 0 && saving.mid > 0 ? Math.round((cost.mid / saving.mid) * 12) : null;
      return { cost, saving, roiMid, paybackMonths, savingBasis: model.savingBasis };
    }

    function getActionPlan(answers, results) {
      const applicable = INTERVENTIONS.filter(i => i.condition(answers, results));
      const scored = applicable.map(i => ({ ...i, score: i.priority(answers, results) }));
      scored.sort((a, b) => b.score - a.score);
      return scored.slice(0, 6); // top 6
    }

    // ─── SCORING ────────────────────────────────────────────────────────────

    function clamp(v, lo = 0, hi = 100) { return Math.min(hi, Math.max(lo, Math.round(v))); }

    function getRiskLevel(score) {
      if (score <= 25) return { label: 'Low',      color: '#16a34a', bgColor: '#dcfce7' };
      if (score <= 50) return { label: 'Moderate', color: '#d97706', bgColor: '#fef3c7' };
      if (score <= 75) return { label: 'Elevated', color: '#ea580c', bgColor: '#ffedd5' };
      return               { label: 'High',     color: '#dc2626', bgColor: '#fee2e2' };
    }

    function formatAUD(n) {
      return new Intl.NumberFormat('en-AU', { style: 'currency', currency: 'AUD', maximumFractionDigits: 0 }).format(n);
    }

    function formatAUDShort(n) {
      if (n >= 1_000_000) return `$${(n / 1_000_000).toFixed(1)}M`;
      if (n >= 1_000) return `$${Math.round(n / 1_000)}K`;
      return `$${Math.round(n)}`;
    }

    // ─── BENCHMARK COMPONENTS ───────────────────────────────────────────────

    function BenchmarkRow({ label, benchmarkVal, benchmarkLabel, yoursVal, yoursLabel, higherIsWorse, sourceNum, note }) {
      const diff = yoursVal - benchmarkVal;
      const pct = benchmarkVal > 0 ? Math.round(Math.abs(diff / benchmarkVal) * 100) : 0;
      const isAbove = diff > 0;
      const isNeutral = pct <= 8;
      const isBad = isNeutral ? false : (higherIsWorse ? isAbove : !isAbove);
      const isGood = isNeutral ? false : (higherIsWorse ? !isAbove : isAbove);

      const color = isNeutral ? '#64748b' : isBad ? '#dc2626' : '#16a34a';
      const bg    = isNeutral ? '#f1f5f9' : isBad ? '#fee2e2'  : '#dcfce7';
      const arrow = isNeutral ? '→' : isAbove ? '↑' : '↓';
      const status = isNeutral
        ? 'At benchmark'
        : `${pct}% ${isAbove ? 'above' : 'below'} avg`;

      return (
        <div className="flex items-start gap-3 py-3.5 border-b border-slate-100 last:border-0">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-1">
              <span className="text-sm font-medium text-slate-800">{label}</span>
              {sourceNum && <sup className="text-[10px] text-slate-400 font-semibold ml-0.5">[{sourceNum}]</sup>}
            </div>
            <div className="flex flex-wrap items-center gap-x-3 gap-y-0.5 mt-1.5">
              <span className="text-xs text-slate-500">
                <span className="font-semibold text-slate-600">{benchmarkLabel}</span>
                <span className="ml-1 text-slate-400">industry avg</span>
              </span>
              <span className="text-slate-300 text-xs">·</span>
              <span className="text-xs text-slate-500">
                <span className="font-semibold text-slate-700">{yoursLabel}</span>
                <span className="ml-1 text-slate-400">yours</span>
              </span>
            </div>
            {note && <p className="text-xs text-slate-400 mt-1 leading-snug">{note}</p>}
          </div>
          <div className="flex-shrink-0 mt-0.5">
            <span className="inline-flex items-center gap-1 text-xs font-bold px-2.5 py-1.5 rounded-lg whitespace-nowrap"
              style={{ backgroundColor: bg, color }}>
              <span>{arrow}</span>
              <span>{status}</span>
            </span>
          </div>
        </div>
      );
    }

    function BenchmarkSection({ answers, results }) {
      const { industry, profile, supportMeasures } = answers;
      const bm = BENCHMARKS[industry];
      if (!bm) return null;

      const costPerEmployee = profile.employeeCount > 0
        ? Math.round(results.cost.total / profile.employeeCount)
        : 0;

      const wcCount = supportMeasures.whiteCollarSupports.length;
      const flCount = supportMeasures.frontlineSupports.filter(s => s !== 'none').length;
      const yourGap = wcCount - flCount;

      // For absence: map qualitative answer to a estimated days figure
      const yourAbsence = profile.absencesIncreased === 'yes'
        ? bm.absenceDays * 1.3
        : profile.absencesIncreased === 'no'
        ? bm.absenceDays * 0.82
        : bm.absenceDays;
      const absenceLabel = profile.absencesIncreased === 'yes'
        ? `Est. ${(bm.absenceDays * 1.3).toFixed(1)}+ days (rising)`
        : profile.absencesIncreased === 'no'
        ? `Est. ${(bm.absenceDays * 0.82).toFixed(1)} days (stable)`
        : 'Trend unknown';

      return (
        <div className="mb-8">
          <div className="flex items-baseline gap-2 mb-1">
            <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-widest">Industry Benchmarks</h3>
          </div>
          <p className="text-xs text-slate-400 mb-4">
            How your inputs compare to published Australian industry averages.
            {' '}<span className="text-slate-500 font-medium">↑ above average · ↓ below average · → at benchmark.</span>
            {' '}Direction of risk noted per metric.
          </p>

          <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden print-card">
            <div className="bg-slate-50 border-b border-slate-100 px-5 py-2.5 grid grid-cols-2 text-xs font-semibold text-slate-400 uppercase tracking-wide">
              <span>Metric</span>
              <span className="text-right">vs Industry Average</span>
            </div>
            <div className="px-5">
              <BenchmarkRow
                label="Annual staff turnover rate"
                benchmarkVal={bm.turnoverRate}
                benchmarkLabel={`${bm.turnoverRate}%`}
                yoursVal={profile.turnoverRate}
                yoursLabel={`${profile.turnoverRate}%`}
                higherIsWorse={true}
                sourceNum={1}
                note={profile.turnoverRate > bm.turnoverRate
                  ? 'Above-average turnover increases replacement cost and signals underlying retention risk.'
                  : profile.turnoverRate < bm.turnoverRate
                  ? 'Below-average turnover is a positive signal — retention may be a relative strength.'
                  : null}
              />
              <BenchmarkRow
                label="Unplanned absence (est. days/employee/yr)"
                benchmarkVal={bm.absenceDays}
                benchmarkLabel={`${bm.absenceDays} days`}
                yoursVal={yourAbsence}
                yoursLabel={absenceLabel}
                higherIsWorse={true}
                sourceNum={2}
                note={profile.absencesIncreased === 'yes'
                  ? 'Rising absence is a leading indicator of workforce stress and a key driver of operational disruption cost.'
                  : null}
              />
              <BenchmarkRow
                label="Estimated annual cost exposure per employee"
                benchmarkVal={bm.costPerEmployee}
                benchmarkLabel={formatAUDShort(bm.costPerEmployee)}
                yoursVal={costPerEmployee}
                yoursLabel={costPerEmployee > 0 ? formatAUDShort(costPerEmployee) : '—'}
                higherIsWorse={true}
                sourceNum={7}
                note="Includes estimated turnover, absence, disruption, and presenteeism cost per head."
              />
              <BenchmarkRow
                label="EVP support gap (white-collar vs frontline measure count)"
                benchmarkVal={bm.supportGap}
                benchmarkLabel={`${bm.supportGap.toFixed(1)} measure gap`}
                yoursVal={yourGap}
                yoursLabel={yourGap >= 0 ? `${yourGap} measure gap` : `${Math.abs(yourGap)} measures ahead (frontline)`}
                higherIsWorse={true}
                sourceNum={8}
                note={yourGap > bm.supportGap + 1
                  ? 'Your support gap is wider than the industry average — frontline employees may perceive meaningful inequity in their employment deal.'
                  : yourGap <= bm.supportGap
                  ? 'Your EVP balance is at or better than industry average for frontline vs white-collar support coverage.'
                  : null}
              />
              <BenchmarkRow
                label="Psychosocial stress prevalence (sector estimate)"
                benchmarkVal={bm.stressPrevalence}
                benchmarkLabel={`~${bm.stressPrevalence}% of workforce`}
                yoursVal={bm.stressPrevalence + (results.whsRiskScore > 50 ? 12 : results.whsRiskScore > 25 ? 4 : -5)}
                yoursLabel={results.whsRiskScore >= 51 ? 'Likely elevated' : results.whsRiskScore >= 26 ? 'Possibly moderate' : 'Potentially below avg'}
                higherIsWorse={true}
                sourceNum={2}
                note="Estimated based on your WHS / psychosocial risk score relative to sector baseline."
              />
            </div>
          </div>

          <div className="mt-3 flex flex-wrap gap-x-4 gap-y-1">
            {[
              { color: '#dcfce7', textColor: '#16a34a', label: 'Below average — favourable' },
              { color: '#fee2e2', textColor: '#dc2626', label: 'Above average — risk signal' },
              { color: '#f1f5f9', textColor: '#64748b', label: 'At benchmark (within 8%)' },
            ].map(({ color, textColor, label }) => (
              <div key={label} className="flex items-center gap-1.5 text-xs text-slate-500">
                <div className="w-3 h-3 rounded-sm flex-shrink-0" style={{ backgroundColor: color, border: `1px solid ${textColor}30` }}/>
                {label}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── ROI CALCULATOR ─────────────────────────────────────────────────────

    function ROICalculator({ totalCostExposure, employeeCount }) {
      const [implCost, setImplCost] = useState('');
      const [platformFeePerEmp, setPlatformFeePerEmp] = useState('');

      const impl = parseFloat(implCost.replace(/[^0-9.]/g, '')) || 0;
      const feePerEmp = parseFloat(platformFeePerEmp.replace(/[^0-9.]/g, '')) || 0;
      const platformTotal = feePerEmp * Math.max(employeeCount, 0);
      const totalInvestment = impl + platformTotal;
      const netSaving = totalCostExposure - totalInvestment;
      const roiMultiple = totalInvestment > 0 ? (totalCostExposure / totalInvestment) : null;
      const roiPct = totalInvestment > 0 ? Math.round(((totalCostExposure - totalInvestment) / totalInvestment) * 100) : null;
      const paybackMonths = totalCostExposure > 0 && totalInvestment > 0
        ? Math.round((totalInvestment / totalCostExposure) * 12)
        : null;

      const hasInputs = totalInvestment > 0;
      const isPositiveROI = netSaving > 0;

      return (
        <div className="mb-8">
          <h3 className="text-xs font-semibold text-slate-500 uppercase tracking-widest mb-1">Return on Investment</h3>
          <p className="text-xs text-slate-400 mb-4">
            Enter your expected investment costs to see the potential return against your estimated workforce cost exposure.
          </p>

          <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden print-card">
            {/* Cost exposure anchor */}
            <div className="bg-slate-900 px-6 py-5 flex items-center justify-between">
              <div>
                <p className="text-slate-400 text-xs font-medium uppercase tracking-wide mb-0.5">Estimated annual cost exposure</p>
                <p className="text-2xl font-extrabold text-white">{formatAUD(totalCostExposure)}</p>
                <p className="text-slate-500 text-xs mt-0.5">The risk cost your business is currently absorbing</p>
              </div>
              <div className="w-10 h-10 rounded-xl bg-slate-700 flex items-center justify-center flex-shrink-0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
              </div>
            </div>

            {/* Inputs */}
            <div className="p-6 border-b border-slate-100">
              <p className="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-4">Your investment</p>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                {/* Implementation cost */}
                <div>
                  <label className="block text-sm font-semibold text-slate-800 mb-0.5">
                    Implementation cost
                  </label>
                  <p className="text-xs text-slate-500 mb-2">One-off setup, onboarding, or project cost (AUD)</p>
                  <div className="relative">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-sm">$</span>
                    <input
                      type="text"
                      inputMode="numeric"
                      value={implCost}
                      onChange={e => setImplCost(e.target.value)}
                      placeholder="e.g. 25,000"
                      className="w-full pl-7 pr-4 py-2.5 border border-slate-300 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                    />
                  </div>
                  {impl > 0 && (
                    <p className="text-xs text-slate-500 mt-1.5">{formatAUD(impl)} one-off</p>
                  )}
                </div>

                {/* Platform fee */}
                <div>
                  <label className="block text-sm font-semibold text-slate-800 mb-0.5">
                    Platform fee per employee
                  </label>
                  <p className="text-xs text-slate-500 mb-2">Annual per-employee subscription or licence fee (AUD)</p>
                  <div className="relative">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-sm">$</span>
                    <input
                      type="text"
                      inputMode="numeric"
                      value={platformFeePerEmp}
                      onChange={e => setPlatformFeePerEmp(e.target.value)}
                      placeholder="e.g. 120"
                      className="w-full pl-7 pr-4 py-2.5 border border-slate-300 rounded-xl text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                    />
                  </div>
                  {feePerEmp > 0 && (
                    <p className="text-xs text-slate-500 mt-1.5">
                      {formatAUD(feePerEmp)} × {employeeCount} employees = <strong className="text-slate-700">{formatAUD(platformTotal)}/yr</strong>
                    </p>
                  )}
                </div>
              </div>

              {/* Cost breakdown */}
              {hasInputs && (
                <div className="mt-5 bg-slate-50 rounded-xl p-4 space-y-2">
                  <div className="flex justify-between text-xs">
                    <span className="text-slate-600">Implementation (one-off)</span>
                    <span className="font-semibold text-slate-800">{formatAUD(impl)}</span>
                  </div>
                  <div className="flex justify-between text-xs">
                    <span className="text-slate-600">Platform fee ({formatAUD(feePerEmp)} × {employeeCount} employees)</span>
                    <span className="font-semibold text-slate-800">{formatAUD(platformTotal)}/yr</span>
                  </div>
                  <div className="border-t border-slate-200 pt-2 flex justify-between text-sm">
                    <span className="font-semibold text-slate-700">Total first-year investment</span>
                    <span className="font-bold text-slate-900">{formatAUD(totalInvestment)}</span>
                  </div>
                </div>
              )}
            </div>

            {/* ROI output */}
            {hasInputs ? (
              <div className="p-6">
                <p className="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-4">Potential return</p>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-5">
                  {/* Net saving */}
                  <div className={`rounded-xl p-4 ${isPositiveROI ? 'bg-emerald-50 border border-emerald-100' : 'bg-red-50 border border-red-100'}`}>
                    <p className="text-xs font-medium mb-1" style={{ color: isPositiveROI ? '#15803d' : '#dc2626' }}>
                      Net annual saving
                    </p>
                    <p className="text-xl font-extrabold" style={{ color: isPositiveROI ? '#15803d' : '#dc2626' }}>
                      {netSaving >= 0 ? '' : '−'}{formatAUDShort(Math.abs(netSaving))}
                    </p>
                    <p className="text-xs mt-1" style={{ color: isPositiveROI ? '#16a34a' : '#dc2626', opacity: 0.8 }}>
                      {isPositiveROI ? 'exposure reduced' : 'investment exceeds exposure estimate'}
                    </p>
                  </div>

                  {/* ROI multiple */}
                  <div className="bg-blue-50 border border-blue-100 rounded-xl p-4">
                    <p className="text-xs font-medium text-blue-700 mb-1">ROI multiple</p>
                    <p className="text-xl font-extrabold text-blue-800">
                      {roiMultiple !== null ? `${roiMultiple.toFixed(1)}×` : '—'}
                    </p>
                    <p className="text-xs text-blue-600 mt-1 opacity-80">
                      return per dollar invested
                    </p>
                  </div>

                  {/* Payback period */}
                  <div className="bg-slate-50 border border-slate-200 rounded-xl p-4">
                    <p className="text-xs font-medium text-slate-600 mb-1">Payback period</p>
                    <p className="text-xl font-extrabold text-slate-800">
                      {paybackMonths !== null
                        ? paybackMonths < 1 ? '< 1 month'
                        : paybackMonths === 1 ? '1 month'
                        : `${paybackMonths} months`
                        : '—'}
                    </p>
                    <p className="text-xs text-slate-500 mt-1 opacity-80">to recover full investment</p>
                  </div>
                </div>

                {/* Visual bar */}
                <div className="bg-slate-50 rounded-xl p-4">
                  <div className="flex justify-between text-xs font-semibold text-slate-500 mb-2">
                    <span>Investment</span>
                    <span>vs Estimated exposure</span>
                  </div>
                  <div className="relative h-6 bg-slate-200 rounded-full overflow-hidden">
                    {/* Investment bar */}
                    <div
                      className="absolute left-0 top-0 h-full rounded-full flex items-center justify-end pr-2"
                      style={{
                        width: `${Math.min((totalInvestment / totalCostExposure) * 100, 100)}%`,
                        backgroundColor: '#2563eb',
                        minWidth: totalInvestment > 0 ? '2%' : '0%',
                      }}
                    >
                      {totalInvestment / totalCostExposure < 0.85 && totalInvestment > 0 && (
                        <span className="text-white text-xs font-bold">{formatAUDShort(totalInvestment)}</span>
                      )}
                    </div>
                  </div>
                  <div className="flex justify-between text-xs text-slate-500 mt-1.5">
                    <span className="flex items-center gap-1">
                      <span className="w-2 h-2 rounded-full bg-blue-600 inline-block"/>
                      Investment: {formatAUDShort(totalInvestment)}
                      {' '}({Math.round((totalInvestment / totalCostExposure) * 100)}% of exposure)
                    </span>
                    <span>Exposure: {formatAUDShort(totalCostExposure)}</span>
                  </div>
                </div>

                <p className="text-xs text-slate-400 mt-4 leading-relaxed">
                  This ROI estimate is directional. It compares your estimated workforce cost exposure against your stated investment
                  and is intended to frame the business case — not replace a detailed financial analysis. Actual savings will depend
                  on implementation effectiveness, workforce uptake, and organisational context.
                </p>
              </div>
            ) : (
              <div className="px-6 py-8 text-center">
                <p className="text-sm text-slate-500">Enter your investment costs above to see the potential return.</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    function SourcesFooter() {
      const [open, setOpen] = useState(false);
      return (
        <div className="mb-8 no-print">
          <button onClick={() => setOpen(o => !o)}
            className="w-full flex items-center justify-between px-5 py-4 bg-white rounded-xl border border-slate-200 hover:border-slate-300 transition-colors text-sm font-semibold text-slate-700">
            <span className="flex items-center gap-2">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-slate-400">

    function calculateScores(answers) {
      const { industry, profile, riskSignals, supportMeasures } = answers;
      const ind = INDUSTRIES.find(i => i.id === industry);
      const mult = ind?.multipliers ?? { turnover: 0.40, absence: 1.10, disruption: 1.10, productivity: 1.00 };

      // Employee Risk
      const empProfile =
        (profile.frontlinePercentage / 100) * 15 +
        (profile.payFrequency === 'monthly' ? 10 : profile.payFrequency === 'fortnightly' ? 5 : 2) +
        (profile.absencesIncreased === 'yes' ? 10 : profile.absencesIncreased === 'unsure' ? 5 : 0) +
        Math.min((profile.turnoverRate / 50) * 5, 5);
      const empSig = (riskSignals.employeeSignals.length / 8) * 60;
      const employeeRiskScore = clamp(empProfile + empSig);

      // Business Risk
      const bizProfile =
        Math.min((profile.turnoverRate / 100) * 50, 20) +
        (profile.frontlinePercentage / 100) * 10 +
        (profile.absencesIncreased === 'yes' ? 5 : profile.absencesIncreased === 'unsure' ? 2 : 0);
      const bizSig = (riskSignals.operationalSignals.length / 8) * 65;
      const businessRiskScore = clamp(bizProfile + bizSig);

      // WHS Risk
      const whsProfile =
        (profile.frontlinePercentage / 100) * 15 +
        (profile.absencesIncreased === 'yes' ? 10 : profile.absencesIncreased === 'unsure' ? 5 : 0) +
        Math.min((profile.turnoverRate / 50) * 5, 5);
      const whsSig = (riskSignals.whsSignals.length / 8) * 70;
      const whsRiskScore = clamp(whsProfile + whsSig);

      // EVP Gap
      const wcCount = supportMeasures.whiteCollarSupports.length;
      const flActual = supportMeasures.frontlineSupports.filter(s => s !== 'none');
      const flCount = flActual.length;
      const hasNone = supportMeasures.frontlineSupports.includes('none');
      let evpRaw = hasNone
        ? 65 + (wcCount / 8) * 35
        : Math.max(wcCount / 8 - flCount / 9, 0) * 55 +
          (1 - flCount / 9) * 25 +
          (profile.frontlinePercentage / 100) * 10 +
          (wcCount > 0 && flCount === 0 ? 10 : 0);
      const evpGapScore = clamp(evpRaw);

      // Cost
      const employees = Math.max(profile.employeeCount, 1);
      const avgSalary = Math.max(effectiveAnnualSalary(profile), 1);
      const flRatio = profile.frontlinePercentage / 100;

      const turnoverCost = employees * (profile.turnoverRate / 100) * avgSalary * mult.turnover;
      const absenceCost = employees * flRatio * (avgSalary / 260) * (employeeRiskScore / 100) * 8 * mult.absence;
      const disruptionCost = employees * 2200 * mult.disruption * (businessRiskScore / 100);
      const productivityCost = employees * avgSalary * (whsRiskScore / 100) * 0.028 * mult.productivity;
      const total = turnoverCost + absenceCost + disruptionCost + productivityCost;

      // Observations
      const obs = [];
      if (profile.frontlinePercentage >= 50)

              {opt.label}
            </button>
          ))}

    function WorkforceProfilePage({ profile, industry, onChange, onNext, onBack }) {
      const annualEquiv = effectiveAnnualSalary(profile);
      const isValid = profile.employeeCount > 0 && annualEquiv > 0;

      const ind = INDUSTRIES.find(i => i.id === industry);

      const frontlineLabel = profile.frontlinePercentage === 0 ? 'Entirely office-based'
        : profile.frontlinePercentage === 100 ? 'Entirely frontline / shift-based'
        : profile.frontlinePercentage <= 30 ? 'Predominantly office-based'
        : profile.frontlinePercentage >= 70 ? 'Predominantly frontline'
        : 'Mixed workforce';

      const turnoverLabel = profile.turnoverRate <= 10 ? 'Low turnover'
        : profile.turnoverRate <= 25 ? 'Moderate turnover'
        : profile.turnoverRate <= 40 ? 'Elevated turnover' : 'High turnover';

      const switchWageType = (type) => {
        if (type === 'hourly') {
          // Convert current annual → implied hourly (÷ weeklyHours ÷ 52), rounded to nearest 0.50
          const implied = profile.averageSalary > 0
            ? Math.round((profile.averageSalary / (profile.weeklyHours * 52)) * 2) / 2
            : (ind?.typicalHourlyRate ?? 0);
          onChange({ wageType: 'hourly', hourlyRate: implied || (ind?.typicalHourlyRate ?? 0) });
        } else {
          // Convert current hourly → annual
          const implied = profile.hourlyRate > 0
            ? Math.round(profile.hourlyRate * profile.weeklyHours * 52 / 1000) * 1000
            : (ind?.typicalAnnualSalary ?? 0);
          onChange({ wageType: 'annual', averageSalary: implied || (ind?.typicalAnnualSalary ?? 0) });
        }
      };

      return (
        <div>
          <div className="mb-8">
            <h2 className="text-2xl font-bold text-slate-900 mb-2">Workforce profile</h2>
            <p className="text-slate-600 text-sm leading-relaxed">These inputs calibrate risk exposure and estimate cost impact. Approximate figures are fine.</p>
          </div>

          {profile.wagePreFilled && ind && (
            <div className="flex items-start gap-2.5 bg-blue-50 border border-blue-100 rounded-xl px-4 py-3 mb-6 text-xs text-blue-700">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="flex-shrink-0 mt-0.5">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span>
                <strong>Pre-filled with {ind.label} industry estimate</strong> — {ind.wageNote}. Adjust to match your actual workforce.
              </span>
            </div>

          <div className="space-y-7">

              <label className="block text-sm font-semibold text-slate-800 mb-0.5">Number of employees</label>

              <input type="number" min="1" value={profile.employeeCount || ''} placeholder="e.g. 150"
                onChange={e => onChange({ employeeCount: parseInt(e.target.value) || 0 })}
                className="w-full sm:w-72 px-4 py-2.5 border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"/>
            </div>

            <div>
              <label className="block text-sm font-semibold text-slate-800 mb-0.5">Frontline / shift-based workforce</label>
              <p className="text-xs text-slate-500 mb-2">Percentage of employees in hourly, rostered, or operational roles</p>
              <div className="flex items-center gap-4">
                <input type="range" min="0" max="100" step="5" value={profile.frontlinePercentage}
                  onChange={e => onChange({ frontlinePercentage: parseInt(e.target.value) })}
                  className="w-full sm:w-64"/>
                <div className="text-right min-w-[90px]">
                  <span className="text-base font-bold text-slate-900">{profile.frontlinePercentage}%</span>
                  <p className="text-xs text-slate-500 leading-tight mt-0.5">{frontlineLabel}</p>
                </div>
              </div>
              {/* Headcount breakdown — only shown once employee count is entered */}
              {profile.employeeCount > 0 && (
                <div className="flex items-center gap-3 mt-3">
                  {(() => {
                    const fl = Math.round(profile.employeeCount * profile.frontlinePercentage / 100);
                    const office = profile.employeeCount - fl;
                    return (
                      <>
                        <div className="flex items-center gap-2 bg-amber-50 border border-amber-100 rounded-lg px-3 py-2">
                          <span className="text-sm">👷</span>
                          <div>
                            <p className="text-sm font-bold text-amber-900">{fl.toLocaleString()}</p>
                            <p className="text-[10px] text-amber-600 font-medium leading-tight">frontline / shift</p>
                          </div>
                        </div>
                        <span className="text-slate-300 text-sm">+</span>
                        <div className="flex items-center gap-2 bg-blue-50 border border-blue-100 rounded-lg px-3 py-2">
                          <span className="text-sm">💼</span>
                          <div>
                            <p className="text-sm font-bold text-blue-900">{office.toLocaleString()}</p>
                            <p className="text-[10px] text-blue-600 font-medium leading-tight">office / salaried</p>
                          </div>
                        </div>
                        <span className="text-slate-300 text-sm">=</span>
                        <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">
                          <div>
                            <p className="text-sm font-bold text-slate-800">{profile.employeeCount.toLocaleString()}</p>
                            <p className="text-[10px] text-slate-500 font-medium leading-tight">total</p>
                          </div>
                        </div>
                      </>
                    );
                  })()}
                </div>
              )}
            </div>

            <div>
              <label className="block text-sm font-semibold text-slate-800 mb-0.5">Average annual turnover rate</label>
              <p className="text-xs text-slate-500 mb-2">Voluntary and involuntary exits as a percentage of total headcount</p>
              <div className="flex items-center gap-4">
                <input type="range" min="0" max="100" step="1" value={profile.turnoverRate}
                  onChange={e => onChange({ turnoverRate: parseInt(e.target.value) })}
                  className="w-full sm:w-64"/>
                <div className="text-right min-w-[90px]">
                  <span className="text-base font-bold text-slate-900">{profile.turnoverRate}%</span>
                  <p className="text-xs text-slate-500 leading-tight mt-0.5">{turnoverLabel}</p>
                </div>
              </div>
            </div>

            {/* Wage input — hourly or annual */}
            <div>
              <div className="flex items-center justify-between mb-0.5">
                <label className="text-sm font-semibold text-slate-800">
                  {profile.wageType === 'hourly' ? 'Average hourly rate (AUD)' : 'Average annual salary (AUD)'}
                </label>
                {/* Hourly / Annual toggle */}
                <div className="flex items-center bg-slate-100 rounded-lg p-0.5 gap-0.5">
                  {[{ value: 'hourly', label: 'Hourly' }, { value: 'annual', label: 'Annual' }].map(opt => (
                    <button key={opt.value} onClick={() => switchWageType(opt.value)}
                      className={`text-xs font-semibold px-3 py-1.5 rounded-md transition-all duration-150 ${profile.wageType === opt.value ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>

              {profile.wageType === 'hourly' ? (
                <div>
                  <p className="text-xs text-slate-500 mb-3">Average hourly rate across your workforce — include loadings and penalty rates if applicable</p>
                  <div className="flex flex-wrap items-end gap-4">
                    <div>
                      <div className="relative w-40">
                        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-sm">$</span>
                        <input type="number" min="0" step="0.5" value={profile.hourlyRate || ''} placeholder="e.g. 28.50"
                          onChange={e => onChange({ hourlyRate: parseFloat(e.target.value) || 0 })}

                      </div>
                      <p className="text-[10px] text-slate-400 mt-1">per hour</p>
                    </div>
                    <div className="text-slate-300 text-lg font-light pb-4">×</div>
                    <div>
                      <div className="flex items-center gap-2">
                        <input type="range" min="20" max="55" step="1" value={profile.weeklyHours}
                          onChange={e => onChange({ weeklyHours: parseInt(e.target.value) })}
                          className="w-28"/>
                        <span className="text-sm font-bold text-slate-900 min-w-[60px]">{profile.weeklyHours} hrs</span>
                      </div>
                      <p className="text-[10px] text-slate-400 mt-1">avg hours/week</p>
                    </div>
                    <div className="text-slate-300 text-lg font-light pb-4">× 52 wks =</div>
                    <div className="pb-1">
                      {profile.hourlyRate > 0 ? (
                        <div className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-center">
                          <p className="text-sm font-extrabold text-slate-900">{formatAUD(annualEquiv)}</p>
                          <p className="text-[10px] text-slate-400 mt-0.5">annual equivalent</p>
                        </div>
                      ) : (
                        <div className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-center opacity-40">
                          <p className="text-sm font-extrabold text-slate-400">—</p>
                          <p className="text-[10px] text-slate-400 mt-0.5">annual equivalent</p>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              ) : (
                <div>
                  <p className="text-xs text-slate-500 mb-2">Approximate average across your workforce</p>
                  <div className="relative w-full sm:w-72">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium text-sm">$</span>
                    <input type="number" min="0" step="5000" value={profile.averageSalary || ''} placeholder="e.g. 65,000"
                      onChange={e => onChange({ averageSalary: parseInt(e.target.value) || 0 })}
                      className="w-full pl-7 pr-4 py-2.5 border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"/>
                  </div>
                  {profile.averageSalary > 0 && (
                    <p className="text-xs text-slate-400 mt-1.5">
                      ≈ ${(profile.averageSalary / (52 * 38)).toFixed(2)}/hr at 38 hrs/wk
                    </p>

                </div>

              <ToggleGroup value={profile.absencesIncreased} onChange={v => onChange({ absencesIncreased: v })}
                options={[{ value: 'yes', label: 'Yes' }, { value: 'no', label: 'No' }, { value: 'unsure', label: 'Unsure' }]}/>
            </div>
          </div>

          {!isValid && (
            <div className="flex items-center gap-2 mt-5 text-slate-500 text-xs">

              Continue <Icon name="chevron-right" size={16}/>
            </button>
          </div>

      );

        <label htmlFor={uid}
          className={`flex items-start gap-3 p-3.5 rounded-xl border cursor-pointer transition-all duration-150 ${checked ? `${checkedBorder} ${checkedBg}` : 'border-slate-200 bg-white hover:border-slate-300 hover:bg-slate-50'}`}>
          <input type="checkbox" id={uid} checked={checked} onChange={onChange}
            className="mt-0.5 h-4 w-4 rounded border-slate-300 flex-shrink-0"/>
          <span className={`text-sm leading-snug ${checked ? checkedText + ' font-medium' : 'text-slate-700'}`}>{label}</span>
        </label>
      );
    }

    function SignalSection({ badge, title, items, selected, prefix, onToggle, badgeBg, badgeText, checkedBorder, checkedBg, checkedText }) {
      return (
        <div className="mb-8">
          <div className="flex items-center gap-2.5 mb-3">
            <div className={`w-6 h-6 rounded-full ${badgeBg} ${badgeText} text-xs font-bold flex items-center justify-center flex-shrink-0`}>{badge}</div>
            <h3 className="font-semibold text-slate-800 text-sm">{title}</h3>
            <span className="text-xs text-slate-400 ml-auto bg-slate-100 px-2 py-0.5 rounded-full">{selected.length}/{items.length}</span>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
            {items.map(item => (
              <CheckboxItem key={item.id} uid={`${prefix}-${item.id}`} label={item.label}
                checked={selected.includes(item.id)} onChange={() => onToggle(item.id)}
                checkedBorder={checkedBorder} checkedBg={checkedBg} checkedText={checkedText}/>
            ))}
          </div>
        </div>
      );
    }

    function RiskSignalsPage({ selected, onChange, onNext, onBack }) {
      const total = selected.employeeSignals.length + selected.operationalSignals.length + selected.whsSignals.length;
      return (
        <div>
          <div className="mb-8">
            <h2 className="text-2xl font-bold text-slate-900 mb-2">Risk signal checklist</h2>
            <p className="text-slate-600 text-sm leading-relaxed">Select the signals your organisation is currently seeing. Selecting none is a valid answer.</p>

          <div className="flex gap-3">
            <button onClick={onBack} className="inline-flex items-center gap-2 text-slate-600 hover:text-slate-900 font-medium px-5 py-3 rounded-xl border border-slate-200 hover:border-slate-300 transition-colors text-sm">
              <Icon name="chevron-left" size={16}/> Back
            </button>
            <button onClick={onNext} className="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-xl transition-colors text-sm">
              Continue <Icon name="chevron-right" size={16}/>
            </button>
          </div>
        </div>
      );
    }

    // ─── SUPPORT MEASURES PAGE ──────────────────────────────────────────────

    function SupportCheckbox({ uid, label, checked, onChange, variant }) {
      const styles = {
        blue:        { border: checked ? 'border-blue-200'    : 'border-slate-200', bg: checked ? 'bg-blue-50'    : 'bg-white hover:border-slate-300 hover:bg-slate-50', text: checked ? 'text-blue-900 font-medium'    : 'text-slate-700' },
        emerald:     { border: checked ? 'border-emerald-200' : 'border-slate-200', bg: checked ? 'bg-emerald-50' : 'bg-white hover:border-slate-300 hover:bg-slate-50', text: checked ? 'text-emerald-900 font-medium' : 'text-slate-700' },
        'none-opt':  { border: checked ? 'border-slate-300'   : 'border-slate-200', bg: checked ? 'bg-slate-100'  : 'bg-white hover:border-slate-300 hover:bg-slate-50', text: checked ? 'text-slate-700 font-medium'   : 'text-slate-500' },
      };
      const s = styles[variant] || styles.blue;
      return (
        <label htmlFor={uid} className={`flex items-start gap-3 p-3.5 rounded-xl border cursor-pointer transition-all duration-150 ${s.border} ${s.bg}`}>
          <input type="checkbox" id={uid} checked={checked} onChange={onChange} className="mt-0.5 h-4 w-4 rounded border-slate-300 flex-shrink-0"/>
          <span className={`text-sm leading-snug ${s.text}`}>{label}</span>
        </label>
      );
    }

    function SupportMeasuresPage({ selected, onChange, onNext, onBack }) {
      const wcCount = selected.whiteCollarSupports.length;
      const flActualCount = selected.frontlineSupports.filter(s => s !== 'none').length;
      const hasNone = selected.frontlineSupports.includes('none');
      const hasImbalance = wcCount >= 3 && (hasNone || wcCount > flActualCount + 2);

      return (
        <div>
          <div className="mb-8">
            <h2 className="text-2xl font-bold text-slate-900 mb-2">Current support measures</h2>
            <p className="text-slate-600 text-sm leading-relaxed">Select the support measures your organisation currently has in place. This drives the EVP gap score.</p>
          </div>

          <div className="mb-8">
            <div className="flex items-center gap-2.5 mb-1">
              <div className="w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold flex items-center justify-center flex-shrink-0">A</div>
              <h3 className="font-semibold text-slate-800 text-sm">White-collar / office-based supports</h3>
              <span className="text-xs text-slate-400 ml-auto bg-slate-100 px-2 py-0.5 rounded-full">{wcCount}/{WC_SUPPORTS.length}</span>
            </div>
            <p className="text-xs text-slate-500 ml-8 mb-3">Benefits and supports typically available to salaried or office-based employees</p>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
              {WC_SUPPORTS.map(sup => (
                <SupportCheckbox key={sup.id} uid={`wc-${sup.id}`} label={sup.label}
                  checked={selected.whiteCollarSupports.includes(sup.id)}
                  onChange={() => onChange('whiteCollarSupports', sup.id)} variant="blue"/>
              ))}
            </div>
          </div>

          <div className="mb-6">
            <div className="flex items-center gap-2.5 mb-1">
              <div className="w-6 h-6 rounded-full bg-emerald-100 text-emerald-700 text-xs font-bold flex items-center justify-center flex-shrink-0">B</div>
              <h3 className="font-semibold text-slate-800 text-sm">Frontline / broader workforce supports</h3>
              <span className="text-xs text-slate-400 ml-auto bg-slate-100 px-2 py-0.5 rounded-full">{flActualCount}/{FL_SUPPORTS.length - 1}</span>
            </div>
            <p className="text-xs text-slate-500 ml-8 mb-3">Supports available to frontline, shift-based, or hourly employees</p>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
              {FL_SUPPORTS.map(sup => (
                <SupportCheckbox key={sup.id} uid={`fl-${sup.id}`} label={sup.label}
                  checked={selected.frontlineSupports.includes(sup.id)}
                  onChange={() => onChange('frontlineSupports', sup.id)}
                  variant={sup.id === 'none' ? 'none-opt' : 'emerald'}/>
              ))}
            </div>
          </div>

          {hasImbalance && (
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6">
              <div className="flex items-start gap-3">
                <Icon name="alert-triangle" size={16} style={{ color: '#d97706', marginTop: 2, flexShrink: 0 }}/>
                <div>
                  <p className="text-sm font-semibold text-amber-800">Support imbalance detected</p>
                  <p className="text-sm text-amber-700 mt-0.5 leading-snug">
                    {hasNone
                      ? `Your white-collar support profile (${wcCount} measures) has no frontline equivalent. This indicates a significant EVP gap.`
                      : `Your white-collar profile (${wcCount} measures) is noticeably stronger than your frontline profile (${flActualCount} measures).`}
                  </p>
                </div>
              </div>
            </div>
          )}

          <div className="flex gap-3">
            <button onClick={onBack} className="inline-flex items-center gap-2 text-slate-600 hover:text-slate-900 font-medium px-5 py-3 rounded-xl border border-slate-200 hover:border-slate-300 transition-colors text-sm">
              <Icon name="chevron-left" size={16}/> Back
            </button>
            <button onClick={onNext} className="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-xl transition-colors text-sm">
              Generate Results <Icon name="chevron-right" size={16}/>
            </button>
          </div>
        </div>
      );
